name: Android CI

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    name: Lint, build, and (on tag) release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -----------------------------------------------------------------------
      # Checkout both repos as siblings so filmr's build script can write
      # libfilmr.so directly into unprocess/app/src/main/jniLibs/
      # -----------------------------------------------------------------------
      - name: Checkout unprocess
        uses: actions/checkout@v4
        with:
          path: unprocess

      - name: Checkout filmr (sibling)
        uses: actions/checkout@v4
        with:
          repository: thetechgeekko/filmr
          ref: ${{ github.ref_name == github.event.repository.default_branch && github.ref || 'main' }}
          path: filmr

      # -----------------------------------------------------------------------
      # Rust + NDK toolchain
      # -----------------------------------------------------------------------
      - name: Install Rust stable with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            filmr/target
          key: ${{ runner.os }}-cargo-filmr-${{ hashFiles('filmr/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-filmr-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install Android NDK r25c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: false

      # -----------------------------------------------------------------------
      # Build native library
      # -----------------------------------------------------------------------
      - name: Build libfilmr.so for all ABIs
        working-directory: filmr
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x android/build-android.sh
          ./android/build-android.sh

      # -----------------------------------------------------------------------
      # Android build
      # -----------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        working-directory: unprocess
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('unprocess/**/*.gradle*', 'unprocess/**/gradle-wrapper.properties', 'unprocess/gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run Android lint
        working-directory: unprocess
        run: ./gradlew lint -PskipFilmrBuild=true

      - name: Run local unit tests
        working-directory: unprocess
        run: ./gradlew testDebugUnitTest -PskipFilmrBuild=true

      - name: Assemble debug APK
        working-directory: unprocess
        run: ./gradlew assembleDebug -PskipFilmrBuild=true

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: unprocess-debug-${{ github.sha }}
          path: unprocess/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      # -----------------------------------------------------------------------
      # Release steps (v* tags only)
      # -----------------------------------------------------------------------
      - name: Assemble release APK
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: unprocess
        run: ./gradlew assembleRelease -PskipFilmrBuild=true

      - name: Upload release APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: unprocess/app/build/outputs/apk/release/*.apk
